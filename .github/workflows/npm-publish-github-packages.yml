name: YouTube Music Auto-Playlist Sync

on:
  schedule:
    # Runs daily at 00:00 KST (15:00 UTC)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual triggering directly from GitHub Actions tab

permissions:
  contents: write

jobs:
  sync_playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          npm install googleapis

      - name: Execute Daily Tracker & Auto-Sync
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
          TOPIC_CHANNEL_ID: ${{ secrets.TOPIC_CHANNEL_ID }}
          FORCE_PLAYLIST_UPDATE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: node scripts/sync-playlist.js

      - name: Commit and Push CSV and TXT Report changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add art_track_views.csv report_logs/ || true
          if git diff --cached --quiet; then
            echo "No changes found. Skipping commit."
          else
            git commit -m "chore: update daily art track views and top 10 reports [$(date -d '+9 hours' +'%Y-%m-%d')]"
            git push
          fi
