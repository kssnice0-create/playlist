name: YouTube Music Auto-Playlist Sync

on:
  schedule:
    # 매주 일요일 00:00 UTC (한국 시간 오전 9:00)에 자동으로 시작됩니다.
    #- cron: '0 0 * * 0'
    - cron: '* * * * *'
  workflow_dispatch: # 깃허브 콘솔에서 수동으로도 즉시 실행 가능합니다.

jobs:
  sync_playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          npm install googleapis

      - name: Execute Daily Tracker & Auto-Sync
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
          TOPIC_CHANNEL_ID: ${{ secrets.TOPIC_CHANNEL_ID }}
          FORCE_PLAYLIST_UPDATE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: node scripts/sync-playlist.js

      - name: Commit and Push CSV changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add art_track_views.csv || true
          if git diff --quiet HEAD art_track_views.csv; then
            echo "No changes found in art_track_views.csv. Skipping commit."
          else
            git commit -m "chore: update daily art track views [$(date -d '+9 hours' +'%Y-%m-%d')]"
            git push
          fi
